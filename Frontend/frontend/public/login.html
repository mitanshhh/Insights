<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Insights AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card animate-in">
            <div class="auth-header">
                <a href="/" class="auth-logo">
                    <span class="logo-icon">N</span>
                    <span class="logo-text">Insights</span>
                </a>
                <h1 id="auth-title">Welcome Back</h1>
                <p id="auth-subtitle" class="text-gray">Please enter your details to sign in</p>
            </div>

            <div class="auth-actions">
                <div class="social-auth">
                    <a href="/auth/google" class="btn-oauth-google">
                        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google" width="20">
                        <span>Continue with Google</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
